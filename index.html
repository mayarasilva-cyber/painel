<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Indicadores — ECGNow</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0D2137;
  --navy-mid:   #1B6CA8;
  --navy-light: #1e3a5f;
  --cyan:       #0ea5e9;
  --cyan-light: #e0f2fe;
  --bg:         #f0f5fa;
  --white:      #ffffff;
  --text:       #1e293b;
  --text-soft:  #64748b;
  --border:     #e2e8f0;
  --green:      #10b981;
  --green-bg:   #d1fae5;
  --red:        #ef4444;
  --red-bg:     #fee2e2;
  --amber:      #f59e0b;
  --amber-bg:   #fef3c7;
  --purple:     #8b5cf6;
  --shadow:     0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.header-left { display: flex; align-items: center; gap: 20px; }
.logo {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--cyan);
  letter-spacing: -0.5px;
}
.header-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
.header-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.2px;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.period-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 6px 14px;
}
.period-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: rgba(255,255,255,0.45);
}
.period-wrap select {
  background: transparent;
  border: none;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
.period-wrap select option { background: #1e3a5f; color: white; }
.period-sep { color: rgba(255,255,255,0.3); font-size: 13px; }
.last-upd {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
}

/* ── CAROUSEL TOGGLE ── */
.btn-tv {
  background: transparent;
  border: 1px solid rgba(14,165,233,0.5);
  color: var(--cyan);
  padding: 6px 14px;
  border-radius: 7px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-tv:hover, .btn-tv.active { background: var(--cyan); color: white; border-color: var(--cyan); }

.btn-refresh {
  background: transparent;
  border: 1px solid rgba(14,165,233,0.5);
  color: var(--cyan);
  padding: 6px 14px;
  border-radius: 7px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-refresh:hover { background: var(--cyan); color: white; border-color: var(--cyan); }
.btn-refresh svg { transition: transform 0.4s; }
.btn-refresh:hover svg { transform: rotate(180deg); }

/* ── CAROUSEL PROGRESS BAR ── */
.carousel-bar {
  height: 3px;
  background: var(--border);
  position: relative;
  display: none;
}
.carousel-bar.active { display: block; }
.carousel-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), #38bdf8);
  width: 0%;
  transition: width 0.3s linear;
}

/* ── TABS ── */
.tab-nav {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 14px 20px;
  border: none;
  background: transparent;
  color: var(--text-soft);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  position: relative;
  top: 1px;
}
.tab-btn:hover { color: var(--navy-mid); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--cyan); }
.tab-icon { font-size: 15px; }

/* ── MAIN ── */
.main {
  padding: 24px 32px 40px;
  max-width: 1440px;
  margin: 0 auto;
}

/* ── TV MODE: bigger fonts ── */
body.tv-mode .main { max-width: 100%; padding: 20px 40px 30px; }
body.tv-mode .kpi-value { font-size: 48px; }
body.tv-mode .section-title { font-size: 26px; }
body.tv-mode .split-num { font-size: 36px; }
body.tv-mode .fin-value { font-size: 32px; }
body.tv-mode .table-card { font-size: 14px; }
body.tv-mode td { font-size: 14px; }

/* ── SECTION BAR ── */
.section-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.section-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--navy);
}
.type-toggle {
  display: flex;
  background: var(--border);
  border-radius: 9px;
  padding: 3px;
  gap: 2px;
}
.type-btn {
  padding: 6px 18px;
  border: none;
  background: transparent;
  color: var(--text-soft);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.18s;
}
.type-btn.active { background: white; color: var(--navy); box-shadow: var(--shadow); }
.type-btn.saas-active { color: var(--cyan); }
.type-btn.td-active { color: var(--navy-mid); }

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  background: white;
  border-radius: 14px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.15s;
}
.kpi-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.kpi-label {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-soft);
  margin-bottom: 10px;
}
.kpi-value {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 38px;
  font-weight: 800;
  color: var(--navy);
  line-height: 1;
  letter-spacing: -1px;
}
.kpi-sub {
  font-size: 11px;
  color: var(--text-soft);
  margin-top: 5px;
  font-weight: 600;
}
.kpi-card.navy-card { background: var(--navy); }
.kpi-card.navy-card .kpi-label { color: rgba(255,255,255,0.45); }
.kpi-card.navy-card .kpi-value { color: var(--cyan); }
.kpi-card.navy-card .kpi-sub { color: rgba(255,255,255,0.4); }
.kpi-card.cyan-card { background: var(--cyan); }
.kpi-card.cyan-card .kpi-label { color: rgba(255,255,255,0.75); }
.kpi-card.cyan-card .kpi-value { color: white; }
.kpi-card.cyan-card .kpi-sub { color: rgba(255,255,255,0.7); }

/* ── SPLIT KPI ROW ── */
.split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
.split-card {
  background: white;
  border-radius: 14px;
  padding: 18px 22px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
}
.split-dot-wrap { flex-shrink: 0; }
.split-dot {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.dot-saas { background: var(--cyan-light); }
.dot-td { background: #dbeafe; }
.split-type {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-soft);
  margin-bottom: 2px;
}
.split-num {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.5px;
  line-height: 1;
}
.split-pct {
  font-size: 11px;
  color: var(--text-soft);
  font-weight: 600;
  margin-top: 2px;
}

/* ── TABLES GRID ── */
.tables-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
.table-card {
  background: white;
  border-radius: 14px;
  padding: 20px 22px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.table-card-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.table-card-title span { opacity: 0.5; font-size: 13px; }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-soft);
  text-align: left;
  padding: 7px 0 7px;
  border-bottom: 1px solid var(--border);
}
td {
  font-size: 13px;
  padding: 9px 0;
  border-bottom: 1px solid #f1f5f9;
  color: var(--text);
  font-weight: 600;
}
tr:last-child td { border-bottom: none; }
.td-rank { width: 22px; font-weight: 800; color: var(--text-soft); font-size: 12px; }
.td-name { flex: 1; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-bar { width: 80px; padding-right: 10px; }
.bar-bg { background: var(--bg); border-radius: 4px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--navy-mid), var(--cyan)); }
.td-count { text-align: right; font-weight: 800; color: var(--navy); font-size: 13px; white-space: nowrap; }
.td-pct { text-align: right; font-size: 11px; color: var(--text-soft); padding-left: 6px; }

/* ── STATUS BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-green { background: var(--green-bg); color: #15803d; }
.badge-red { background: var(--red-bg); color: #b91c1c; }
.badge-amber { background: var(--amber-bg); color: #b45309; }
.badge-blue { background: var(--cyan-light); color: #0369a1; }
.badge-navy { background: #dbeafe; color: var(--navy-mid); }

/* ── REPETIÇÃO ── */
.rep-hero {
  background: white;
  border-radius: 14px;
  padding: 28px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 36px;
  flex-wrap: wrap;
}
.rep-ring-wrap { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
.rep-ring-svg { transform: rotate(-90deg); }
.rep-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.rep-ring-num { font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; font-weight: 800; color: var(--navy); line-height: 1; }
.rep-ring-label { font-size: 11px; color: var(--text-soft); font-weight: 700; }
.rep-stats { display: flex; gap: 32px; flex-wrap: wrap; }
.rep-stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-soft); margin-bottom: 4px; }
.rep-stat-val { font-family: 'Bricolage Grotesque', sans-serif; font-size: 32px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
.rep-stat-sub { font-size: 11px; color: var(--text-soft); font-weight: 600; }

/* ── FINANCEIRO ── */
.fin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.fin-card {
  background: white; border-radius: 14px; padding: 22px 24px;
  border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.fin-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.fin-receita::before { background: var(--green); }
.fin-despesa::before { background: var(--red); }
.fin-margem::before { background: var(--cyan); }
.fin-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-soft); margin-bottom: 10px; }
.fin-value { font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; margin-bottom: 4px; }
.fin-receita .fin-value { color: var(--green); }
.fin-despesa .fin-value { color: var(--red); }
.fin-margem .fin-value { color: var(--navy); }
.fin-margem .fin-value.positive { color: var(--green); }
.fin-margem .fin-value.negative { color: var(--red); }
.fin-sub { font-size: 11px; color: var(--text-soft); font-weight: 600; }
.fin-realizado { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-soft); font-weight: 600; }
.fin-realizado strong { color: var(--text); font-weight: 800; }
.fin-tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

/* ── VISÃO GERAL GRID ── */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.overview-sector {
  background: white;
  border-radius: 16px;
  padding: 22px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.overview-sector:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.overview-sector::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--cyan);
}
.sector-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.sector-emoji { font-size: 22px; }
.sector-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
}
.sector-kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.sector-kpi-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-soft);
  margin-bottom: 2px;
}
.sector-kpi-val {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--navy);
  line-height: 1;
  letter-spacing: -0.5px;
}
.sector-kpi-sub {
  font-size: 10px;
  color: var(--text-soft);
  font-weight: 600;
  margin-top: 2px;
}

/* ── LOADING / ERROR ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; gap: 16px; color: var(--text-soft); }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; font-weight: 600; color: var(--text-soft); }
.error-box { background: var(--red-bg); border: 1px solid #fca5a5; color: #b91c1c; padding: 16px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }

/* ── RESPONSIVE ── */
@media (max-width: 960px) {
  .tables-grid, .split-row, .fin-grid, .fin-tables-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .overview-grid { grid-template-columns: 1fr 1fr; }
  .main { padding: 16px; }
  .header { padding: 0 16px; }
  .tab-nav { padding: 0 16px; }
}
@media (max-width: 600px) {
  .overview-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <span class="logo">ECGNow</span>
    <div class="header-divider"></div>
    <span class="header-title">Painel de Indicadores</span>
  </div>
  <div class="header-right">
    <div class="period-wrap">
      <span class="period-label">Período</span>
      <select id="selMonth"></select>
      <span class="period-sep">/</span>
      <select id="selYear"></select>
    </div>
    <span class="last-upd" id="lastUpd">—</span>
    <button class="btn-tv" id="btnTv" onclick="toggleCarousel()">
      📺 Modo TV
    </button>
    <button class="btn-refresh" onclick="refreshAll()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Atualizar
    </button>
  </div>
</header>

<!-- CAROUSEL PROGRESS -->
<div class="carousel-bar" id="carouselBar"><div class="carousel-fill" id="carouselFill"></div></div>

<!-- TABS -->
<nav class="tab-nav">
  <button class="tab-btn active" id="tab-GERAL" onclick="switchTab('GERAL')">
    <span class="tab-icon">🏠</span> Visão Geral
  </button>
  <button class="tab-btn" id="tab-HOLTER" onclick="switchTab('HOLTER')">
    <span class="tab-icon">📊</span> Holter
  </button>
  <button class="tab-btn" id="tab-REPETICAO" onclick="switchTab('REPETICAO')">
    <span class="tab-icon">🔁</span> Repetição
  </button>
  <button class="tab-btn" id="tab-MAPA" onclick="switchTab('MAPA')">
    <span class="tab-icon">🗺️</span> Mapa
  </button>
  <button class="tab-btn" id="tab-ECG" onclick="switchTab('ECG')">
    <span class="tab-icon">❤️</span> ECG
  </button>
  <button class="tab-btn" id="tab-CHAMADOS" onclick="switchTab('CHAMADOS')">
    <span class="tab-icon">🎧</span> Chamados
  </button>
  <button class="tab-btn" id="tab-FINANCEIRO" onclick="switchTab('FINANCEIRO')">
    <span class="tab-icon">💰</span> Financeiro
  </button>
</nav>

<!-- MAIN CONTENT -->
<main class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div><span class="loading-text">Carregando dados…</span></div>
</main>

<script>
// ═══════════════════════════════════════════════
//  CONFIG — URL do Apps Script Web App
// ═══════════════════════════════════════════════
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbymCeVfk9My80qyLDAPagzwu27trsQvPkOrd79bhBVQmeA8lKJi-ciegfSjyDDapxE/exec';

const COLS = {
  HOLTER:    { date:1, emerg:0, tempo:4, central:7 },
  MAPA:      { date:1, emerg:0, tempo:4, central:6 },
  ECG:       { date:2, emerg:0, tempo:4, central:6 },
  REPETICAO: { date:0, saaslaudo:9, modalidade:10 },
  CHAMADOS:  { status:0, date:1, atendente:4, origem:6, tipoSolic:8, tempo:11 },
  FINANCEIRO:{ tipo:0, categoria:1, status:4, valorPrev:6, valorReal:7, dataPrev:8, dataReal:9 }
};

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const TAB_ORDER = ['GERAL','HOLTER','REPETICAO','MAPA','ECG','CHAMADOS','FINANCEIRO'];
const CAROUSEL_INTERVAL = 15000; // 15s por aba

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let cache = {};
let currentTab = 'GERAL';
let examFilter = { HOLTER:'all', MAPA:'all', ECG:'all' };
let selMonth, selYear;
let carouselActive = false;
let carouselTimer = null;
let carouselProgressTimer = null;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
(function init() {
  const now = new Date();
  selMonth = now.getMonth();
  selYear  = now.getFullYear();

  const mSel = document.getElementById('selMonth');
  const ySel = document.getElementById('selYear');
  MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = m;
    if (i === selMonth) opt.selected = true;
    mSel.appendChild(opt);
  });
  for (let y = 2024; y <= now.getFullYear() + 1; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === selYear) opt.selected = true;
    ySel.appendChild(opt);
  }
  mSel.addEventListener('change', () => { selMonth = +mSel.value; refreshAll(); });
  ySel.addEventListener('change', () => { selYear = +ySel.value; loadTab(currentTab); });

  preloadAll();

  // Auto-refresh every 5 min
  setInterval(() => { cache = {}; preloadAll(); }, 5 * 60 * 1000);
})();

async function preloadAll() {
  document.getElementById('mainContent').innerHTML =
    `<div class="loading"><div class="spinner"></div><span class="loading-text">Carregando dados das abas…</span></div>`;

  const keys = ['HOLTER','REPETICAO','MAPA','ECG','CHAMADOS','FINANCEIRO'];
  try {
    await Promise.all(keys.map(k => fetchData(k)));
  } catch(e) {}
  loadTab(currentTab);
}

// ═══════════════════════════════════════════════
//  FETCH VIA APPS SCRIPT PROXY
// ═══════════════════════════════════════════════
window._rawData = {};

async function fetchData(key) {
  if (cache[key]) return cache[key];

  const resp = await fetch(`${PROXY_URL}?sheet=${key}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ao carregar ${key}`);

  const json = await resp.json();
  if (json.error) throw new Error(`Apps Script (${key}): ${json.error}`);

  window._rawData[key] = json.rows;
  const result = { data: json.rows || [] };
  cache[key] = result;
  return result;
}

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function parseDate(str) {
  if (!str || str === '-') return null;
  str = String(str).trim();
  let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function filterPeriod(data, dateColIdx) {
  return data.filter(r => {
    const d = parseDate(r[dateColIdx]);
    return d && d.getMonth() === selMonth && d.getFullYear() === selYear;
  });
}

function parseDuration(str) {
  if (!str || str === '-' || str === '') return null;
  const p = str.split(':');
  if (p.length < 2) return null;
  return (parseFloat(p[0])||0)*60 + (parseFloat(p[1])||0) + (parseFloat(p[2])||0)/60;
}

function fmtDuration(mins) {
  if (mins === null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
}

function parseCurrency(str) {
  if (!str || str === '-') return 0;
  return parseFloat(str.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;
}
function fmtCurrency(val) {
  if (isNaN(val)) return 'R$ —';
  return val.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}
function fmtNum(n) { return (n||0).toLocaleString('pt-BR'); }
function isSaas(central) { return central && central.toUpperCase().startsWith('[SAAS]'); }

function topN(data, colIdx, n = 10) {
  const counts = {};
  data.forEach(r => { const v = (r[colIdx]||'').trim(); if (v && v !== '-') counts[v] = (counts[v]||0)+1; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, n);
}
function avgDuration(data, colIdx) {
  const vals = data.map(r => parseDuration(r[colIdx])).filter(v => v !== null && v > 0);
  if (!vals.length) return null;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════
//  CAROUSEL (MODO TV)
// ═══════════════════════════════════════════════
function toggleCarousel() {
  carouselActive = !carouselActive;
  const btn = document.getElementById('btnTv');
  const bar = document.getElementById('carouselBar');
  btn.classList.toggle('active', carouselActive);
  bar.classList.toggle('active', carouselActive);
  document.body.classList.toggle('tv-mode', carouselActive);

  if (carouselActive) {
    startCarousel();
  } else {
    stopCarousel();
  }
}

function startCarousel() {
  stopCarousel();
  runCarouselProgress();
  carouselTimer = setInterval(() => {
    const idx = TAB_ORDER.indexOf(currentTab);
    const next = TAB_ORDER[(idx + 1) % TAB_ORDER.length];
    switchTab(next);
    runCarouselProgress();
  }, CAROUSEL_INTERVAL);
}

function stopCarousel() {
  if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
  if (carouselProgressTimer) { clearInterval(carouselProgressTimer); carouselProgressTimer = null; }
  document.getElementById('carouselFill').style.width = '0%';
}

function runCarouselProgress() {
  const fill = document.getElementById('carouselFill');
  fill.style.width = '0%';
  let pct = 0;
  const step = 100 / (CAROUSEL_INTERVAL / 300);
  if (carouselProgressTimer) clearInterval(carouselProgressTimer);
  carouselProgressTimer = setInterval(() => {
    pct += step;
    fill.style.width = Math.min(pct, 100) + '%';
    if (pct >= 100) clearInterval(carouselProgressTimer);
  }, 300);
}

// ═══════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  loadTab(tab);
  // Reset carousel timer on manual click
  if (carouselActive) { startCarousel(); }
}

window.setExamFilter = function(tab, filter) {
  examFilter[tab] = filter;
  loadTab(tab);
};

function refreshAll() {
  cache = {};
  preloadAll();
}

async function loadTab(tab) {
  const content = document.getElementById('mainContent');
  content.innerHTML = `<div class="loading"><div class="spinner"></div><span class="loading-text">Carregando…</span></div>`;
  try {
    if (tab === 'GERAL') {
      await renderGeral();
    } else if (['HOLTER','MAPA','ECG'].includes(tab)) {
      await renderExamTab(tab);
    } else if (tab === 'REPETICAO') {
      await renderRepeticao();
    } else if (tab === 'CHAMADOS') {
      await renderChamados();
    } else if (tab === 'FINANCEIRO') {
      await renderFinanceiro();
    }
    document.getElementById('lastUpd').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    content.innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}

        </table>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  RENDER: REPETIÇÃO
// ═══════════════════════════════════════════════
async function renderRepeticao() {
  const { data } = await fetchData('REPETICAO');
  const c = COLS.REPETICAO;
  const rows = filterPeriod(data, c.date);
  const total = rows.length;
  const saasLaudo = rows.filter(r => (r[c.saaslaudo]||'').trim()).length;
  const pctSaas = total > 0 ? ((saasLaudo/total)*100) : 0;
  const circumference = 2 * Math.PI * 50;
  const offset = circumference - (pctSaas/100)*circumference;

  const topMod = topN(rows, c.modalidade, 8);
  const maxMod = topMod[0]?.[1] || 1;

  document.getElementById('mainContent').innerHTML = `
    <div class="section-bar">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="section-title">🔁 Repetição</div>
        <div style="font-size:13px;color:var(--text-soft);font-weight:600">${MONTHS[selMonth]} ${selYear}</div>
      </div>
    </div>

    <div class="rep-hero">
      <div class="rep-ring-wrap">
        <svg class="rep-ring-svg" width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#e2e8f0" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--cyan)" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
        </svg>
        <div class="rep-ring-text">
          <div class="rep-ring-num">${pctSaas.toFixed(0)}%</div>
          <div class="rep-ring-label">SAAS</div>
        </div>
      </div>
      <div class="rep-stats">
        <div class="rep-stat">
          <div class="rep-stat-label">Total Repetições</div>
          <div class="rep-stat-val">${fmtNum(total)}</div>
          <div class="rep-stat-sub">${MONTHS[selMonth]} ${selYear}</div>
        </div>
        <div class="rep-stat">
          <div class="rep-stat-label">Com Laudo SAAS</div>
          <div class="rep-stat-val">${fmtNum(saasLaudo)}</div>
          <div class="rep-stat-sub">${pctSaas.toFixed(1)}% do total</div>
        </div>
        <div class="rep-stat">
          <div class="rep-stat-label">Sem Laudo SAAS</div>
          <div class="rep-stat-val">${fmtNum(total-saasLaudo)}</div>
          <div class="rep-stat-sub">${(100-pctSaas).toFixed(1)}%</div>
        </div>
      </div>
    </div>

    <div class="tables-grid">
      <div class="table-card">
        <div class="table-card-title">🩺 Por Modalidade <span>(top 8)</span></div>
        ${!topMod.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>' : `
        <table><thead><tr><th>#</th><th>Modalidade</th><th style="width:80px"></th><th style="text-align:right">Qtd</th><th style="text-align:right;padding-left:6px">%</th></tr></thead>
        <tbody>${topMod.map(([name,count],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name">${esc(name)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(count/maxMod*100).toFixed(0)}%"></div></div></td>
            <td class="td-count">${fmtNum(count)}</td>
            <td class="td-pct">${((count/total)*100).toFixed(1)}%</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  RENDER: CHAMADOS
// ═══════════════════════════════════════════════
async function renderChamados() {
  const { data } = await fetchData('CHAMADOS');
  const c = COLS.CHAMADOS;
  const rows = filterPeriod(data, c.date);
  const total = rows.length;

  const statusMap = {};
  rows.forEach(r => { const s = (r[c.status]||'').trim(); if (s) statusMap[s] = (statusMap[s]||0)+1; });

  const topAtend  = topN(rows, c.atendente, 8);
  const topOrigem = topN(rows, c.origem, 8);
  const topTipo   = topN(rows, c.tipoSolic, 8);
  const avgT      = avgDuration(rows, c.tempo);

  const maxAtend  = topAtend[0]?.[1]  || 1;
  const maxOrigem = topOrigem[0]?.[1] || 1;
  const maxTipo   = topTipo[0]?.[1]   || 1;

  const statusBadge = s => {
    const sl = s.toLowerCase();
    if (sl.includes('conclu')) return 'badge-green';
    if (sl.includes('encerr')) return 'badge-red';
    if (sl.includes('aberto') || sl.includes('andamento')) return 'badge-amber';
    return 'badge-navy';
  };

  document.getElementById('mainContent').innerHTML = `
    <div class="section-bar">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="section-title">🎧 Chamados</div>
        <div style="font-size:13px;color:var(--text-soft);font-weight:600">${MONTHS[selMonth]} ${selYear}</div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card navy-card">
        <div class="kpi-label">Total de Chamados</div>
        <div class="kpi-value">${fmtNum(total)}</div>
        <div class="kpi-sub">${MONTHS[selMonth]} ${selYear}</div>
      </div>
      <div class="kpi-card cyan-card">
        <div class="kpi-label">Média Atendimento</div>
        <div class="kpi-value" style="font-size:28px">${fmtDuration(avgT)}</div>
        <div class="kpi-sub">por chamado</div>
      </div>
      ${Object.entries(statusMap).slice(0,3).map(([s,n]) => `
        <div class="kpi-card">
          <div class="kpi-label">${esc(s)}</div>
          <div class="kpi-value">${fmtNum(n)}</div>
          <div class="kpi-sub">${total > 0 ? ((n/total)*100).toFixed(1) : 0}%</div>
        </div>`).join('')}
    </div>

    <div class="tables-grid">
      <div class="table-card">
        <div class="table-card-title">👤 Por Atendente <span>(top 8)</span></div>
        ${!topAtend.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>' : `
        <table><thead><tr><th>#</th><th>Atendente</th><th style="width:80px"></th><th style="text-align:right">Qtd</th><th style="text-align:right;padding-left:6px">%</th></tr></thead>
        <tbody>${topAtend.map(([name,count],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name">${esc(name)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(count/maxAtend*100).toFixed(0)}%"></div></div></td>
            <td class="td-count">${fmtNum(count)}</td>
            <td class="td-pct">${((count/total)*100).toFixed(1)}%</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>

      <div class="table-card">
        <div class="table-card-title">📋 Status dos Chamados</div>
        ${!Object.keys(statusMap).length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>' : `
        <table><thead><tr><th>Status</th><th style="text-align:right">Qtd</th><th style="text-align:right;padding-left:6px">%</th></tr></thead>
        <tbody>${Object.entries(statusMap).sort((a,b)=>b[1]-a[1]).map(([s,n]) => `
          <tr>
            <td><span class="badge ${statusBadge(s)}">${esc(s)}</span></td>
            <td class="td-count">${fmtNum(n)}</td>
            <td class="td-pct">${((n/total)*100).toFixed(1)}%</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>
    </div>

    <div class="tables-grid">
      <div class="table-card">
        <div class="table-card-title">🏢 Centrais com Mais Chamados <span>(top 8)</span></div>
        ${!topOrigem.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>' : `
        <table><thead><tr><th>#</th><th>Central / Origem</th><th style="width:80px"></th><th style="text-align:right">Qtd</th></tr></thead>
        <tbody>${topOrigem.map(([name,count],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name" title="${esc(name)}">${esc(name)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(count/maxOrigem*100).toFixed(0)}%"></div></div></td>
            <td class="td-count">${fmtNum(count)}</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>

      <div class="table-card">
        <div class="table-card-title">🔧 Tipos de Solicitação <span>(top 8)</span></div>
        ${!topTipo.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>' : `
        <table><thead><tr><th>#</th><th>Tipo</th><th style="width:80px"></th><th style="text-align:right">Qtd</th></tr></thead>
        <tbody>${topTipo.map(([name,count],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name" title="${esc(name)}">${esc(name)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(count/maxTipo*100).toFixed(0)}%"></div></div></td>
            <td class="td-count">${fmtNum(count)}</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  RENDER: FINANCEIRO
// ═══════════════════════════════════════════════
async function renderFinanceiro() {
  const { data } = await fetchData('FINANCEIRO');
  const c = COLS.FINANCEIRO;

  const projRows = data.filter(r => { const d = parseDate(r[c.dataPrev]); return d && d.getMonth()===selMonth && d.getFullYear()===selYear; });
  const realRows = data.filter(r => { const d = parseDate(r[c.dataReal]); return d && d.getMonth()===selMonth && d.getFullYear()===selYear && (r[c.status]||'').toLowerCase().includes('realizado'); });

  const recPrev  = projRows.filter(r=>(r[c.tipo]||'').toLowerCase()==='entrada').reduce((s,r)=>s+parseCurrency(r[c.valorPrev]),0);
  const despPrev = projRows.filter(r=>{const t=(r[c.tipo]||'').toLowerCase();return t==='saída'||t==='saida';}).reduce((s,r)=>s+parseCurrency(r[c.valorPrev]),0);
  const recReal  = realRows.filter(r=>(r[c.tipo]||'').toLowerCase()==='entrada').reduce((s,r)=>s+parseCurrency(r[c.valorReal]),0);
  const despReal = realRows.filter(r=>{const t=(r[c.tipo]||'').toLowerCase();return t==='saída'||t==='saida';}).reduce((s,r)=>s+parseCurrency(r[c.valorReal]),0);
  const margPrev = recPrev - despPrev;
  const margReal = recReal - despReal;
  const margPct  = recPrev > 0 ? (margPrev/recPrev*100) : 0;

  const recCats = {}, despCats = {};
  projRows.forEach(r => {
    const tipo = (r[c.tipo]||'').toLowerCase();
    const cat  = (r[c.categoria]||'').trim();
    if (!cat || cat === '-') return;
    if (tipo === 'entrada') recCats[cat] = (recCats[cat]||0)+parseCurrency(r[c.valorPrev]);
    else despCats[cat] = (despCats[cat]||0)+parseCurrency(r[c.valorPrev]);
  });
  const topRec  = Object.entries(recCats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topDesp = Object.entries(despCats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxRec  = topRec[0]?.[1]  || 1;
  const maxDesp = topDesp[0]?.[1] || 1;

  document.getElementById('mainContent').innerHTML = `
    <div class="section-bar">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="section-title">💰 Financeiro</div>
        <div style="font-size:13px;color:var(--text-soft);font-weight:600">${MONTHS[selMonth]} ${selYear}</div>
      </div>
    </div>

    <div class="fin-grid">
      <div class="fin-card fin-receita">
        <div class="fin-label">Receita Projetada</div>
        <div class="fin-value">${fmtCurrency(recPrev)}</div>
        <div class="fin-sub">base: Data Prevista</div>
        <div class="fin-realizado">Realizado: <strong>${fmtCurrency(recReal)}</strong></div>
      </div>
      <div class="fin-card fin-despesa">
        <div class="fin-label">Despesas Projetadas</div>
        <div class="fin-value">${fmtCurrency(despPrev)}</div>
        <div class="fin-sub">base: Data Prevista</div>
        <div class="fin-realizado">Realizado: <strong>${fmtCurrency(despReal)}</strong></div>
      </div>
      <div class="fin-card fin-margem">
        <div class="fin-label">Margem de Contribuição</div>
        <div class="fin-value ${margPrev>=0?'positive':'negative'}">${fmtCurrency(margPrev)}</div>
        <div class="fin-sub">${margPct.toFixed(1)}% da receita projetada</div>
        <div class="fin-realizado">Realizado: <strong style="color:${margReal>=0?'var(--green)':'var(--red)'}">${fmtCurrency(margReal)}</strong></div>
      </div>
    </div>

    <div class="fin-tables-grid">
      <div class="table-card">
        <div class="table-card-title">📥 Receitas por Categoria</div>
        ${!topRec.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados no período.</p>' : `
        <table><thead><tr><th>#</th><th>Categoria</th><th style="width:80px"></th><th style="text-align:right">Valor</th></tr></thead>
        <tbody>${topRec.map(([cat,val],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name" title="${esc(cat)}">${esc(cat)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(val/maxRec*100).toFixed(0)}%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div></td>
            <td class="td-count" style="color:var(--green)">${fmtCurrency(val)}</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>

      <div class="table-card">
        <div class="table-card-title">📤 Despesas por Categoria</div>
        ${!topDesp.length ? '<p style="color:var(--text-soft);font-size:13px">Sem dados no período.</p>' : `
        <table><thead><tr><th>#</th><th>Categoria</th><th style="width:80px"></th><th style="text-align:right">Valor</th></tr></thead>
        <tbody>${topDesp.map(([cat,val],i) => `
          <tr>
            <td class="td-rank">${i+1}</td>
            <td class="td-name" title="${esc(cat)}">${esc(cat)}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(val/maxDesp*100).toFixed(0)}%;background:linear-gradient(90deg,#ef4444,#f87171)"></div></div></td>
            <td class="td-count" style="color:var(--red)">${fmtCurrency(val)}</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>
    </div>
  `;
}
</script>
</body>
