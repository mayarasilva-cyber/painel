<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Indicadores — ECGNow</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── VARIABLES ─── */
:root{--navy:#0D2137;--navy-mid:#1B6CA8;--navy-light:#1e3a5f;--cyan:#0ea5e9;--cyan-light:#e0f2fe;--bg:#f0f5fa;--white:#fff;--text:#1e293b;--text-soft:#64748b;--border:#e2e8f0;--green:#10b981;--green-bg:#d1fae5;--red:#ef4444;--red-bg:#fee2e2;--amber:#f59e0b;--amber-bg:#fef3c7;--shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Nunito,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── HEADER ─── */
.header{background:var(--navy);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-left{display:flex;align-items:center;gap:20px}
.logo{font-family:Bricolage Grotesque,sans-serif;font-size:20px;font-weight:800;color:var(--cyan);letter-spacing:-.5px}
.header-divider{width:1px;height:24px;background:rgba(255,255,255,.15)}
.header-title{font-family:Bricolage Grotesque,sans-serif;font-size:16px;font-weight:600;color:rgba(255,255,255,.85)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 14px}
.period-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.45)}
.period-wrap select{background:transparent;border:none;color:#fff;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;outline:none;appearance:none}
.period-wrap select option{background:#1e3a5f;color:#fff}
.period-sep{color:rgba(255,255,255,.3);font-size:13px}
.last-upd{font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap}
.hdr-btn{background:transparent;border:1px solid rgba(14,165,233,.5);color:var(--cyan);padding:6px 12px;border-radius:7px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.hdr-btn:hover,.hdr-btn.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.view-toggle{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.view-btn{padding:6px 14px;border:none;background:transparent;color:rgba(255,255,255,.5);font-family:Nunito,sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.view-btn.active{background:rgba(14,165,233,.3);color:var(--cyan)}

/* ─── CAROUSEL ─── */
.carousel-bar{height:3px;background:var(--border);position:relative;display:none}
.carousel-bar.active{display:block}
.carousel-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#38bdf8);width:0%;transition:width .3s linear}

/* ─── TABS ─── */
.tab-nav{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 20px;border:none;background:transparent;color:var(--text-soft);font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px;position:relative;top:1px}
.tab-btn:hover{color:var(--navy-mid)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--cyan)}
.tab-icon{font-size:15px}

/* ─── MAIN ─── */
.main{padding:20px 32px 32px;max-width:1440px;margin:0 auto}

/* ─── PERIOD BADGE (visible in TV) ─── */
.tv-period-badge{display:none}

/* ─── SECTION ─── */
.section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.section-title{font-family:Bricolage Grotesque,sans-serif;font-size:22px;font-weight:800;color:var(--navy)}
.section-sub{font-size:13px;color:var(--text-soft);font-weight:600}
.type-toggle{display:flex;background:var(--border);border-radius:9px;padding:3px;gap:2px}
.type-btn{padding:6px 18px;border:none;background:transparent;color:var(--text-soft);font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:7px;transition:all .18s}
.type-btn.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}

/* ─── KPI CARDS ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.kpi-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-soft);margin-bottom:8px}
.kpi-value{font-family:Bricolage Grotesque,sans-serif;font-size:34px;font-weight:800;color:var(--navy);line-height:1;letter-spacing:-1px}
.kpi-sub{font-size:12px;color:var(--text-soft);margin-top:4px;font-weight:600}
.kpi-card.navy-card{background:var(--navy)}.kpi-card.navy-card .kpi-label{color:rgba(255,255,255,.55)}.kpi-card.navy-card .kpi-value{color:var(--cyan)}.kpi-card.navy-card .kpi-sub{color:rgba(255,255,255,.5)}
.kpi-card.cyan-card{background:var(--cyan)}.kpi-card.cyan-card .kpi-label{color:rgba(255,255,255,.8)}.kpi-card.cyan-card .kpi-value{color:#fff}.kpi-card.cyan-card .kpi-sub{color:rgba(255,255,255,.75)}
.kpi-card.cyan-card .cmp.up{color:#d1fae5}.kpi-card.cyan-card .cmp.down{color:#fef08a}.kpi-card.cyan-card .cmp.neutral{color:rgba(255,255,255,.6)}

/* ─── COMPARISON ─── */
.cmp{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;margin-top:4px}
.cmp.up{color:var(--green)}.cmp.down{color:var(--red)}.cmp.neutral{color:var(--text-soft)}

/* ─── TREND BARS ─── */
.trend{display:flex;align-items:flex-end;gap:6px;height:64px;margin-top:10px;padding-bottom:22px;padding-top:20px;position:relative}
.trend-bar{flex:1;border-radius:5px 5px 0 0;position:relative;min-width:18px;transition:height .3s}
.trend-bar-default{background:rgba(14,165,233,.15)}
.trend-bar-current{background:#0ea5e9}
.trend-bar-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--text-soft);white-space:nowrap}
.trend-bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:var(--navy);white-space:nowrap}
/* TV overrides */
body.tv-mode .trend-bar-default{background:rgba(56,189,248,.2)}
body.tv-mode .trend-bar-current{background:#38bdf8}
body.tv-mode .trend-bar-lbl{color:#7dd3fc;font-size:12px}
body.tv-mode .trend-bar-val{color:#e2e8f0;font-size:13px;font-weight:800}
body.tv-mode .trend{height:60px;padding-bottom:24px;padding-top:22px}

/* ─── SPLIT ROW ─── */
.split-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.split-card{background:#fff;border-radius:12px;padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.split-dot{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dot-saas{background:var(--cyan-light)}.dot-td{background:#dbeafe}
.split-type{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-soft);margin-bottom:2px}
.split-num{font-family:Bricolage Grotesque,sans-serif;font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-.5px;line-height:1}
.split-pct{font-size:12px;color:var(--text-soft);font-weight:600;margin-top:2px}

/* ─── TABLES ─── */
.tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.table-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.table-card-title{font-family:Bricolage Grotesque,sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.table-card-title span{opacity:.5;font-size:12px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);text-align:left;padding:6px 0;border-bottom:1px solid var(--border)}
td{font-size:13px;padding:8px 0;border-bottom:1px solid #f1f5f9;color:var(--text);font-weight:600}
tr:last-child td{border-bottom:none}
.td-rank{width:22px;font-weight:800;color:var(--text-soft);font-size:12px}
.td-name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-bar{width:90px;padding-right:10px}
.bar-bg{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--navy-mid),var(--cyan))}
.td-count{text-align:right;font-weight:800;color:var(--navy);font-size:14px;white-space:nowrap}
.td-pct{text-align:right;font-size:12px;color:var(--text-soft);padding-left:6px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-green{background:var(--green-bg);color:#15803d}.badge-red{background:var(--red-bg);color:#b91c1c}.badge-amber{background:var(--amber-bg);color:#b45309}.badge-blue{background:var(--cyan-light);color:#0369a1}.badge-navy{background:#dbeafe;color:var(--navy-mid)}

/* ─── REPETIÇÃO ─── */
.rep-hero{background:#fff;border-radius:12px;padding:22px 28px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.rep-ring-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.rep-ring-svg{transform:rotate(-90deg)}
.rep-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rep-ring-num{font-family:Bricolage Grotesque,sans-serif;font-size:24px;font-weight:800;color:var(--navy);line-height:1}
.rep-ring-label{font-size:12px;color:var(--text-soft);font-weight:700}
.rep-stats{display:flex;gap:28px;flex-wrap:wrap}
.rep-stat-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-soft);margin-bottom:4px}
.rep-stat-val{font-family:Bricolage Grotesque,sans-serif;font-size:30px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.rep-stat-sub{font-size:12px;color:var(--text-soft);font-weight:600}

/* ─── OVERVIEW ─── */
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.overview-sector{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.overview-sector:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.overview-sector::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cyan)}
.sector-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sector-emoji{font-size:20px}
.sector-name{font-family:Bricolage Grotesque,sans-serif;font-size:15px;font-weight:700;color:var(--navy)}
.sector-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sector-kpi-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin-bottom:2px}
.sector-kpi-val{font-family:Bricolage Grotesque,sans-serif;font-size:22px;font-weight:800;color:var(--navy);line-height:1;letter-spacing:-.5px}
.sector-kpi-sub{font-size:11px;color:var(--text-soft);font-weight:600;margin-top:2px}

/* ─── FINANCEIRO (hidden) ─── */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.fin-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden}
.fin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.fin-receita::before{background:var(--green)}.fin-despesa::before{background:var(--red)}.fin-margem::before{background:var(--cyan)}
.fin-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-soft);margin-bottom:8px}
.fin-value{font-family:Bricolage Grotesque,sans-serif;font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px;margin-bottom:4px}
.fin-receita .fin-value{color:var(--green)}.fin-despesa .fin-value{color:var(--red)}.fin-margem .fin-value{color:var(--navy)}
.fin-margem .fin-value.positive{color:var(--green)}.fin-margem .fin-value.negative{color:var(--red)}
.fin-sub{font-size:12px;color:var(--text-soft);font-weight:600}
.fin-realizado{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text-soft);font-weight:600}
.fin-realizado strong{color:var(--text);font-weight:800}
.fin-tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}


/* ─── NCTs ─── */
.ncts-header{display:flex;align-items:center;gap:20px;margin-bottom:12px;flex-wrap:wrap}
.ncts-global{background:#fff;border-radius:14px;padding:16px 22px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;flex-shrink:0}
.ncts-ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.ncts-ring-svg{transform:rotate(-90deg)}
.ncts-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Bricolage Grotesque,sans-serif;font-size:18px;font-weight:800;color:var(--navy)}
.ncts-global-info{display:flex;flex-direction:column;gap:2px}
.ncts-global-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-soft)}
.ncts-global-detail{font-size:13px;font-weight:600;color:var(--text)}
.ncts-trims{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.ncts-trim-card{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden}
.ncts-trim-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ncts-trim-card.t1::before{background:var(--cyan)}
.ncts-trim-card.t2::before{background:var(--amber)}
.ncts-trim-card.t3::before{background:var(--green)}
.ncts-trim-card.t4::before{background:#8b5cf6}
.ncts-trim-title{font-family:Bricolage Grotesque,sans-serif;font-size:16px;font-weight:800;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ncts-trim-pct{font-size:20px;color:var(--cyan)}
.ncts-trim-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px}
.ncts-trim-fill{height:100%;border-radius:3px;transition:width .3s}
.ncts-trim-detail{font-size:12px;color:var(--text-soft);font-weight:600}
.ncts-sectors{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;flex:1;min-height:0;overflow:hidden}
.ncts-sector-card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.ncts-sector-name{font-family:Bricolage Grotesque,sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.ncts-sector-pct{font-size:14px;font-weight:800}
.ncts-sector-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:4px}
.ncts-sector-fill{height:100%;border-radius:3px}
.ncts-sector-detail{font-size:11px;color:var(--text-soft);font-weight:600}
/* TV */
body.tv-mode .ncts-global{background:#101b2e;border-color:#1a2744}
body.tv-mode .ncts-ring-text{color:#f1f5f9}
body.tv-mode .ncts-global-label{color:#94a3b8}
body.tv-mode .ncts-global-detail{color:#cbd5e1;font-size:14px}
body.tv-mode .ncts-trim-card{background:#101b2e;border-color:#1a2744}
body.tv-mode .ncts-trim-title{color:#f1f5f9;font-size:18px}
body.tv-mode .ncts-trim-pct{font-size:24px}
body.tv-mode .ncts-trim-bar{background:#1a2744;height:8px}
body.tv-mode .ncts-trim-detail{color:#94a3b8;font-size:14px}
body.tv-mode .ncts-sector-card{background:#101b2e;border-color:#1a2744}
body.tv-mode .ncts-sector-name{color:#f1f5f9;font-size:15px}
body.tv-mode .ncts-sector-pct{font-size:16px}
body.tv-mode .ncts-sector-bar{background:#1a2744;height:6px}
body.tv-mode .ncts-sector-detail{color:#94a3b8;font-size:13px}

/* ─── AVISOS ─── */
.avisos-grid{display:flex;flex-direction:column;gap:10px;flex:1;overflow:hidden}
.aviso-card{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow);border-left:4px solid var(--cyan)}
.aviso-alta{border-left-color:var(--red)}
.aviso-normal{border-left-color:var(--cyan)}
.aviso-info{border-left-color:var(--amber)}
.aviso-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.aviso-prio{font-size:16px}
.aviso-titulo{font-family:Bricolage Grotesque,sans-serif;font-size:16px;font-weight:700;color:var(--navy);flex:1}
.aviso-data{font-size:12px;color:var(--text-soft);font-weight:600}
.aviso-msg{font-size:14px;color:var(--text);line-height:1.5;font-weight:500}
/* TV */
body.tv-mode .aviso-card{background:#101b2e;border-color:#1a2744}
body.tv-mode .aviso-alta{border-left-color:#f87171}
body.tv-mode .aviso-normal{border-left-color:#38bdf8}
body.tv-mode .aviso-info{border-left-color:#fbbf24}
body.tv-mode .aviso-titulo{color:#f1f5f9;font-size:18px}
body.tv-mode .aviso-data{color:#94a3b8;font-size:14px}
body.tv-mode .aviso-msg{color:#cbd5e1;font-size:16px}
body.tv-mode .aviso-prio{font-size:20px}

/* ─── MAPA BRASIL ─── */
.map-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;flex:1;min-height:0}
.map-container{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.map-container svg{width:100%;height:100%;max-height:calc(100vh - 220px)}
.map-container svg path{stroke:#fff;stroke-width:.5;cursor:default;transition:opacity .2s}
.map-sidebar{display:flex;flex-direction:column;gap:12px;overflow:hidden}
.map-legend{background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;flex-shrink:0}
.map-legend-title{font-family:Bricolage Grotesque,sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px}
.map-legend-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:6px}
.map-legend-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-soft);font-weight:700}
.map-ranking{background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;flex:1;overflow:hidden}
.map-ranking-title{font-family:Bricolage Grotesque,sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px}
.map-rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9}
.map-rank-row:last-child{border-bottom:none}
.map-rank-pos{font-size:12px;font-weight:800;color:var(--text-soft);width:20px;text-align:center}
.map-rank-uf{font-size:14px;font-weight:800;color:var(--navy);width:28px}
.map-rank-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.map-rank-fill{height:100%;border-radius:3px}

<script>
// ═══════════════════════════════════════════════
//  CONFIG — CSV direto do Google Sheets (CDN, sem proxy)
// ═══════════════════════════════════════════════
const CSV_BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vTcbbHtFlaA3tt8Mv1NF22YPbetZRLM9chO6G1gqWSpO2RSPQu_7Gzi_V4RINu_CYG-tGCQI4evg3RF/pub?single=true&output=csv&gid=';
const CSV_GIDS={HOLTER:'0',HOLTER_IEM:'935984391',REPETICAO:'65846932',MAPA:'1563131554',ECG:'135941513',CHAMADOS:'1748165610',FINANCEIRO:'558473626',LOCALIDADE:'1098931569',AVISOS:'2139582642',NCTS:'1774453101'};

const COLS={
  HOLTER:{date:1,emerg:0,tempo:4,central:7},
  MAPA:{date:1,emerg:0,tempo:4,central:6},
  ECG:{date:2,emerg:0,tempo:4,central:6},
  REPETICAO:{date:0,central:1,analista:2,motivo:3,saaslaudo:9,modalidade:10},
  CHAMADOS:{status:0,date:1,atendente:4,origem:6,tipoSolic:8,tempo:11},
  FINANCEIRO:{tipo:0,categoria:1,status:4,banco:5,valorPrev:6,valorReal:7,dataPrev:8,dataReal:9}
};
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const TAB_ORDER=['GERAL','HOLTER','REPETICAO','MAPA','ECG','CHAMADOS','NCTS','LOCALIDADE','AVISOS'];
const CAROUSEL_MS=30000;

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let cache={},currentTab='GERAL',examFilter={HOLTER:'all',MAPA:'all',ECG:'all'};
let selMonth,selYear,selWeek=1,viewMode='month';
let carouselActive=false,carouselTimer=null,carouselProgressTimer=null;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
(function init(){
  const now=new Date();selMonth=now.getMonth();selYear=now.getFullYear();
  const mS=document.getElementById('selMonth'),yS=document.getElementById('selYear');
  MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;if(i===selMonth)o.selected=true;mS.appendChild(o)});
  for(let y=2024;y<=now.getFullYear()+1;y++){const o=document.createElement('option');o.value=y;o.textContent=y;if(y===selYear)o.selected=true;yS.appendChild(o)}
  mS.addEventListener('change',()=>{selMonth=+mS.value;buildWeekOpts();refreshAll()});
  yS.addEventListener('change',()=>{selYear=+yS.value;buildWeekOpts();refreshAll()});
  buildWeekOpts();
  document.getElementById('selWeek').addEventListener('change',e=>{selWeek=+e.target.value;loadTab(currentTab)});
  preloadAll();
  setInterval(()=>{cache={};preloadAll()},5*60*1000);
})();

function buildWeekOpts(){
  const s=document.getElementById('selWeek');s.innerHTML='';
  const dim=new Date(selYear,selMonth+1,0).getDate();
  for(let w=1;w<=Math.ceil(dim/7);w++){const st=(w-1)*7+1,en=Math.min(w*7,dim);const o=document.createElement('option');o.value=w;o.textContent=`${st}-${en}`;s.appendChild(o)}
  selWeek=1;
}
function setViewMode(m){
  viewMode=m;
  document.getElementById('viewMonth').classList.toggle('active',m==='month');
  document.getElementById('viewWeek').classList.toggle('active',m==='week');
  loadTab(currentTab);
}

// ═══════════════════════════════════════════════
//  FETCH — CSV direto (todas as abas em paralelo)
// ═══════════════════════════════════════════════
function csvParse(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}

async function fetchData(key){
  if(cache[key])return cache[key];
  const gid=CSV_GIDS[key];if(!gid&&gid!=='0')throw new Error('GID não encontrado: '+key);
  const r=await fetch(CSV_BASE+gid);
  if(!r.ok)throw new Error(`HTTP ${r.status} – ${key}`);
  const t=await r.text();
  // Validate it's actually CSV, not an HTML error page
  if(t.trim().startsWith('<!') || t.trim().startsWith('<html')){
    console.warn(`${key}: resposta HTML em vez de CSV (aba pode não estar publicada)`);
    const res={data:[]};cache[key]=res;return res;
  }
  const lines=t.split('\n').filter(l=>l.trim()),rows=[];
  for(let i=1;i<lines.length;i++){const c=csvParse(lines[i]);if(c.length>=2)rows.push(c)}
  const res={data:rows};cache[key]=res;return res;
}

async function preloadAll(){
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><span class="loading-text">Carregando dados…</span></div>';
  const keys=['HOLTER','HOLTER_IEM','REPETICAO','MAPA','ECG','CHAMADOS','FINANCEIRO','NCTS','LOCALIDADE','AVISOS'];
  const results=await Promise.allSettled(keys.map(k=>fetchData(k)));
  results.forEach((r,i)=>{if(r.status==='rejected')console.warn(keys[i]+' falhou:',r.reason)});
  loadTab(currentTab);
}

// ═══════════════════════════════════════════════
//  HOLTER + IEM
// ═══════════════════════════════════════════════
async function getHolterMerged(){
  const{data:h}=await fetchData('HOLTER');
  let iem=[];try{iem=(await fetchData('HOLTER_IEM')).data}catch(e){}
  const mapped=iem.map(r=>{const a=new Array(11).fill('');a[0]='Não';a[1]=r[2]||'';a[4]='';a[7]='[Saas]Alemanha IEM';return a});
  return{data:[...h,...mapped]};
}

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function parseDate(s){if(!s||s==='-')return null;s=String(s).trim();let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);const d=new Date(s);return isNaN(d.getTime())?null:d}

function getWeekRange(){
  // Últimos 7 dias completos (exclui hoje)
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date(today);end.setDate(end.getDate()-1); // ontem
  const start=new Date(end);start.setDate(start.getDate()-6); // 7 dias antes de ontem
  return{startDate:start,endDate:end};
}

function filterPeriod(data,col){
  if(viewMode==='week'){
    const{startDate,endDate}=getWeekRange();
    const st=startDate.getTime(),en=endDate.getTime()+86399999;
    return data.filter(r=>{const d=parseDate(r[col]);if(!d)return false;const t=d.getTime();return t>=st&&t<=en});
  }
  return data.filter(r=>{const d=parseDate(r[col]);if(!d||d.getMonth()!==selMonth||d.getFullYear()!==selYear)return false;return true});
}
function filterPrevPeriod(data,col){
  if(viewMode==='week'){
    const{startDate}=getWeekRange();
    const prevEnd=new Date(startDate.getTime()-86400000); // dia antes do start
    const prevStart=new Date(prevEnd.getTime()-6*86400000);
    const st=prevStart.getTime(),en=prevEnd.getTime()+86399999;
    return data.filter(r=>{const d=parseDate(r[col]);if(!d)return false;const t=d.getTime();return t>=st&&t<=en});
  }
  let pm=selMonth-1,py=selYear;if(pm<0){pm=11;py--}
  const now=new Date();
  let maxDay;
  if(selYear===now.getFullYear()&&selMonth===now.getMonth())maxDay=now.getDate()-1;
  else maxDay=new Date(selYear,selMonth+1,0).getDate();
  return data.filter(r=>{const d=parseDate(r[col]);if(!d||d.getMonth()!==pm||d.getFullYear()!==py)return false;return d.getDate()<=maxDay});
}

function parseDur(s){if(!s||s==='-'||s==='')return null;const p=String(s).split(':');if(p.length<2)return null;return(parseFloat(p[0])||0)*3600+(parseFloat(p[1])||0)*60+(parseFloat(p[2])||0)}
function fmtHMS(sec){if(sec===null||isNaN(sec))return'—';const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.round(sec%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function avgSecs(data,col){const v=data.map(r=>parseDur(r[col])).filter(x=>x!==null&&x>0);if(!v.length)return null;return v.reduce((a,b)=>a+b,0)/v.length}

function parseNum(s){if(s===''||s==null||s==='-')return 0;if(typeof s==='number')return s;s=String(s);if(/^-?\d+(\.\d+)?$/.test(s))return parseFloat(s);return parseFloat(s.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0}
function fmtCurr(v){if(isNaN(v))return'R$ —';return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtNum(n){return(n||0).toLocaleString('pt-BR')}
function isSaas(c){return c&&c.toUpperCase().startsWith('[SAAS]')}
function topN(data,col,n=10){const c={};data.forEach(r=>{const v=(r[col]||'').trim();if(v&&v!=='-')c[v]=(c[v]||0)+1});return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,n)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tvN(){return carouselActive?5:8}

function cmpHTML(cur,prev,sfx='',invert=false){
  if(prev===0||prev===null)return'<div class="cmp neutral">— sem dados ant.</div>';
  const p=((cur-prev)/prev*100);const up=invert?p<0:p>0;const dn=invert?p>0:p<0;
  const cls=up?'up':dn?'down':'neutral';const ar=up?'↑':dn?'↓':'→';
  let ref;
  if(viewMode==='week'){
    const{startDate}=getWeekRange();
    const prevEnd=new Date(startDate);prevEnd.setDate(prevEnd.getDate()-1);
    const prevStart=new Date(prevEnd);prevStart.setDate(prevStart.getDate()-6);
    ref=`${prevStart.getDate()}/${prevStart.getMonth()+1}-${prevEnd.getDate()}/${prevEnd.getMonth()+1}`;
  }else{
    let pm=selMonth-1,py=selYear;if(pm<0){pm=11;py--}
    ref=`${MONTHS[pm].substring(0,3)} (proporcional)`;
  }
  return`<div class="cmp ${cls}">${ar} ${Math.abs(p).toFixed(1)}% vs ${ref}</div>`;
}
function pLabel(){
  if(viewMode==='week'){
    const{startDate,endDate}=getWeekRange();
    return`${startDate.getDate()}/${startDate.getMonth()+1} a ${endDate.getDate()}/${endDate.getMonth()+1}`;
  }
  return`${MONTHS[selMonth]} ${selYear}`;
}
function fullDateRange(){
  if(viewMode==='week'){
    const{startDate,endDate}=getWeekRange();
    const fmt=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    return`${fmt(startDate)} a ${fmt(endDate)}`;
  }
  const now=new Date();
  let lastDay;
  if(selYear===now.getFullYear()&&selMonth===now.getMonth()) lastDay=now.getDate()-1;
  else lastDay=new Date(selYear,selMonth+1,0).getDate();
  return`01/${String(selMonth+1).padStart(2,'0')}/${selYear} a ${lastDay}/${String(selMonth+1).padStart(2,'0')}/${selYear}`;
}
function prevDateRange(){
  if(viewMode==='week'){
    const{startDate}=getWeekRange();
    const prevEnd=new Date(startDate);prevEnd.setDate(prevEnd.getDate()-1);
    const prevStart=new Date(prevEnd);prevStart.setDate(prevStart.getDate()-6);
    return`${prevStart.getDate()}/${prevStart.getMonth()+1} a ${prevEnd.getDate()}/${prevEnd.getMonth()+1}`;
  }
  let pm=selMonth-1,py=selYear;if(pm<0){pm=11;py--}
  const now=new Date();
  let maxDay;
  if(selYear===now.getFullYear()&&selMonth===now.getMonth())maxDay=now.getDate()-1;
  else maxDay=new Date(selYear,selMonth+1,0).getDate();
  return`01-${maxDay} ${MONTHS[pm].substring(0,3)} ${py}`;
}
function tvBadge(){
  if(!carouselActive)return'';
  const icon=viewMode==='month'?'📅':'📆';
  const mode=viewMode==='month'?'VISÃO MENSAL':'VISÃO SEMANAL';
  return`<div class="tv-period-badge"><span class="tv-period-icon">${icon}</span><span class="tv-period-mode">${mode}</span><span class="tv-period-range">${fullDateRange()}</span><span class="tv-period-vs">vs ${prevDateRange()}</span></div>`;
}

// Sparkline: monthly or weekly trend bars
function getMonthlyTrend(data,dateCol,countFn){
  // Months from Jan 2026 up to current selected month
  const bars=[];
  const startMonth=0; // Janeiro
  const startYear=2026;
  let m=startMonth,y=startYear;
  while(y<selYear||(y===selYear&&m<=selMonth)){
    const mm=m,yy=y;
    const rows=data.filter(r=>{const d=parseDate(r[dateCol]);return d&&d.getMonth()===mm&&d.getFullYear()===yy});
    const val=countFn?countFn(rows):rows.length;
    bars.push({label:MONTHS[mm].substring(0,3),value:val,current:mm===selMonth&&yy===selYear});
    m++;if(m>11){m=0;y++}
  }
  return bars;
}
function getWeeklyTrend(data,dateCol,countFn){
  const today=new Date();today.setHours(0,0,0,0);
  const bars=[];
  for(let w=3;w>=0;w--){
    const end=new Date(today.getTime()-(1+w*7)*86400000);
    const start=new Date(end.getTime()-6*86400000);
    const st=start.getTime(),en=end.getTime()+86399999;
    const rows=data.filter(r=>{const d=parseDate(r[dateCol]);if(!d)return false;const t=d.getTime();return t>=st&&t<=en});
    const val=countFn?countFn(rows):rows.length;
    bars.push({label:`${start.getDate()}/${start.getMonth()+1}`,value:val,current:w===0});
  }
  return bars;
}
function sparkHTML(bars){
  if(!bars.length)return'';
  const mx=Math.max(...bars.map(b=>b.value),1);
  return`<div class="trend">${bars.map(b=>{
    const h=Math.max((b.value/mx)*100,6);
    const cls=b.current?'trend-bar-current':'trend-bar-default';
    const valStr=b.value>=1000?(b.value/1000).toFixed(1)+'k':fmtNum(b.value);
    return`<div class="trend-bar ${cls}" style="height:${h}%" title="${b.label}: ${fmtNum(b.value)}"><span class="trend-bar-val">${valStr}</span><span class="trend-bar-lbl">${b.label}</span></div>`;
  }).join('')}</div>`;
}
function getTrend(data,dateCol,countFn){
  return viewMode==='month'?getMonthlyTrend(data,dateCol,countFn):getWeeklyTrend(data,dateCol,countFn);
}

function toggleCarousel(){

function startC(){stopC();runProg();carouselTimer=setInterval(()=>{
  const i=TAB_ORDER.indexOf(currentTab);

  // When cycle restarts (back to GERAL), toggle month/week
  if(nextIdx===0){
    const newMode=viewMode==='month'?'week':'month';
    setViewMode(newMode);
  }
  switchTab(TAB_ORDER[nextIdx]);runProg();
},CAROUSEL_MS)}
function stopC(){if(carouselTimer){clearInterval(carouselTimer);carouselTimer=null}if(carouselProgressTimer){clearInterval(carouselProgressTimer);carouselProgressTimer=null}document.getElementById('carouselFill').style.width='0%'}
function runProg(){const f=document.getElementById('carouselFill');f.style.width='0%';let p=0;const s=100/(CAROUSEL_MS/300);if(carouselProgressTimer)clearInterval(carouselProgressTimer);carouselProgressTimer=setInterval(()=>{p+=s;f.style.width=Math.min(p,100)+'%';if(p>=100)clearInterval(carouselProgressTimer)},300)}

async function loadTab(tab){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div><span class="loading-text">Carregando…</span></div>';
  try{
    if(tab==='GERAL')await renderGeral();
    else if(['HOLTER','MAPA','ECG'].includes(tab))await renderExam(tab);
    else if(tab==='REPETICAO')await renderRep();
    else if(tab==='CHAMADOS')await renderCham();
    else if(tab==='NCTS')await renderNCTs();
    else if(tab==='LOCALIDADE')await renderLocalidade();
    else if(tab==='AVISOS')await renderAvisos();
    else if(tab==='FINANCEIRO')await renderFin();
    document.getElementById('lastUpd').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

async function renderCham(){
  const{data}=await fetchData('CHAMADOS');const c=COLS.CHAMADOS;
  const rows=filterPeriod(data,c.date),prev=filterPrevPeriod(data,c.date);const tot=rows.length;
  const stMap={};rows.forEach(r=>{const s=(r[c.status]||'').trim();if(s)stMap[s]=(stMap[s]||0)+1});
  const tA=topN(rows,c.atendente,tvN()),mxA=tA[0]?.[1]||1;
  const tO=topN(rows,c.origem,tvN()),mxO=tO[0]?.[1]||1;
  const tT=topN(rows,c.tipoSolic,tvN()),mxT=tT[0]?.[1]||1;
  const avg=avgSecs(rows,c.tempo),pAvg=avgSecs(prev,c.tempo);
  const sBadge=s=>{const l=s.toLowerCase();if(l.includes('conclu'))return'badge-green';if(l.includes('encerr'))return'badge-red';if(l.includes('aberto')||l.includes('andamento'))return'badge-amber';return'badge-navy'};
  const chamTrend=getTrend(data,c.date);

  document.getElementById('mainContent').innerHTML=`
    ${tvBadge()}
    <div class="section-bar"><div style="display:flex;align-items:center;gap:14px"><div class="section-title">🎧 Chamados</div><div class="section-sub">${pLabel()}</div></div></div>
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card navy-card"><div class="kpi-label">Total</div><div class="kpi-value">${fmtNum(tot)}</div><div class="kpi-sub">${pLabel()}</div>${cmpHTML(tot,prev.length)}</div>
      <div class="kpi-card cyan-card"><div class="kpi-label">Média Atendimento</div><div class="kpi-value" style="font-size:22px">${fmtHMS(avg)}</div><div class="kpi-sub">por chamado</div>${avg!==null&&pAvg!==null?cmpHTML(avg,pAvg,'',true):''}</div>
      ${Object.entries(stMap).slice(0,1).map(([s,n])=>`<div class="kpi-card"><div class="kpi-label">${esc(s)}</div><div class="kpi-value">${fmtNum(n)}</div><div class="kpi-sub">${tot>0?((n/tot)*100).toFixed(1):0}%</div></div>`).join('')}
      <div class="kpi-card"><div class="kpi-label">Evolução ${viewMode==='month'?'Mensal':'Semanal'}</div>${sparkHTML(chamTrend)}</div>
    </div>
    <div class="tables-grid">
      <div class="table-card"><div class="table-card-title">👤 Atendentes <span>(top ${tvN()})</span></div>${mkTable(tA,mxA,tot)}</div>
      <div class="table-card"><div class="table-card-title">📋 Status</div>
        ${!Object.keys(stMap).length?'<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>':`
        <table><thead><tr><th>Status</th><th style="text-align:right">Qtd</th><th style="text-align:right;padding-left:6px">%</th></tr></thead>
        <tbody>${Object.entries(stMap).sort((a,b)=>b[1]-a[1]).map(([s,n])=>`<tr><td><span class="badge ${sBadge(s)}">${esc(s)}</span></td><td class="td-count">${fmtNum(n)}</td><td class="td-pct">${((n/tot)*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table>`}</div>
    </div>
    <div class="tables-grid">
      <div class="table-card"><div class="table-card-title">🏢 Centrais <span>(top ${tvN()})</span></div>${mkTable(tO,mxO,tot,false)}</div>
      <div class="table-card"><div class="table-card-title">🔧 Tipos <span>(top ${tvN()})</span></div>${mkTable(tT,mxT,tot,false)}</div>
    </div>`;
}
function mkTable(arr,mx,tot,showPct=true){
  if(!arr.length)return'<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>';
  return`<table><thead><tr><th>#</th><th>Nome</th><th style="width:80px"></th><th style="text-align:right">Qtd</th>${showPct?'<th style="text-align:right;padding-left:6px">%</th>':''}</tr></thead>
  <tbody>${arr.map(([n,cnt],i)=>`<tr><td class="td-rank">${i+1}</td><td class="td-name" title="${esc(n)}">${esc(n)}</td><td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(cnt/mx*100).toFixed(0)}%"></div></div></td><td class="td-count">${fmtNum(cnt)}</td>${showPct?`<td class="td-pct">${((cnt/tot)*100).toFixed(1)}%</td>`:''}</tr>`).join('')}</tbody></table>`;
}




// ═══════════════════════════════════════════════
//  RENDER: NCTs (Narrativas, Compromissos, Tarefas)
// ═══════════════════════════════════════════════
const TRIM_COLORS={T1:'var(--cyan)',T2:'var(--amber)',T3:'var(--green)',T4:'#8b5cf6'};
const SECTOR_EMOJIS={Comercial:'💼',CS:'🎧',Educação:'📚',Financeiro:'💰','Gestão de Pessoas':'👥',Holter:'📊',Marketing:'📣',TI:'💻'};

async function renderNCTs(){
  const{data}=await fetchData('NCTS');
  // Col: 0=Subnarrativa,1=Compromisso,2=Tarefa,3=Status,4=Trimestre,5=RDI,6=Participante,...,10=Setor,11=Status_R
  
  // Filter valid rows (skip headers and empty)
  const rows=data.filter(r=>{
    const setor=(r[10]||'').trim();
    const trim=(r[4]||'').trim();
    const tarefa=(r[2]||'').trim();
    return setor&&setor!=='Setor'&&setor!=='#REF!'&&trim&&/^T[1-4]$/.test(trim)&&tarefa;
  });
  
  const totalTasks=rows.length;
  const doneTasks=rows.filter(r=>String(r[3]).trim()==='TRUE'||String(r[3]).trim()==='true'||r[3]===true).length;
  const globalPct=totalTasks>0?(doneTasks/totalTasks*100):0;
  
  // Per trimester
  const trims={};
  ['T1','T2','T3','T4'].forEach(t=>{
    const tRows=rows.filter(r=>(r[4]||'').trim()===t);
    const done=tRows.filter(r=>String(r[3]).trim()==='TRUE'||String(r[3]).trim()==='true'||r[3]===true).length;
    trims[t]={total:tRows.length,done:done,pct:tRows.length>0?(done/tRows.length*100):0};
  });
  
  // Per sector
  const sectors={};
  rows.forEach(r=>{
    const setor=(r[10]||'').trim();
    if(!sectors[setor])sectors[setor]={total:0,done:0};
    sectors[setor].total++;
    if(String(r[3]).trim()==='TRUE'||String(r[3]).trim()==='true'||r[3]===true)sectors[setor].done++;
  });
  const sortedSectors=Object.entries(sectors).sort((a,b)=>(b[1].done/b[1].total)-(a[1].done/a[1].total));
  
  // Ring SVG
  const circ=2*Math.PI*26;
  const ringOffset=circ-(globalPct/100)*circ;
  const ringColor=globalPct>=70?'var(--green)':globalPct>=40?'var(--amber)':'var(--red)';
  
  // Current quarter
  const currentQ='T'+(Math.floor(new Date().getMonth()/3)+1);
  
  document.getElementById('mainContent').innerHTML=`
    ${tvBadge()}
    <div class="section-bar">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="section-title">🎯 NCTs 2026</div>
        <div class="section-sub">Narrativas · Compromissos · Tarefas</div>
      </div>
    </div>
    
    <div class="ncts-header">
      <div class="ncts-global">
        <div class="ncts-ring-wrap">
          <svg class="ncts-ring-svg" width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="${carouselActive?'#1a2744':'#e2e8f0'}" stroke-width="6"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="${ringColor}" stroke-width="6"
              stroke-dasharray="${circ}" stroke-dashoffset="${ringOffset}" stroke-linecap="round"/>
          </svg>
          <div class="ncts-ring-text">${globalPct.toFixed(0)}%</div>
        </div>
        <div class="ncts-global-info">
          <div class="ncts-global-label">Progresso Geral</div>
          <div class="ncts-global-detail">${doneTasks} de ${totalTasks} tarefas concluídas</div>
          <div class="ncts-global-detail">${sortedSectors.length} setores · Trimestre atual: ${currentQ}</div>
        </div>
      </div>
    </div>
    
    <div class="ncts-trims">
      ${['T1','T2','T3','T4'].map(t=>{
        const s=trims[t];
        const isCurrent=t===currentQ;
        const color=TRIM_COLORS[t];
        return`<div class="ncts-trim-card ${t.toLowerCase()}${isCurrent?' current':''}">
          <div class="ncts-trim-title"><span>${t}${isCurrent?' ⬤':''}</span><span class="ncts-trim-pct" style="color:${color}">${s.pct.toFixed(0)}%</span></div>
          <div class="ncts-trim-bar"><div class="ncts-trim-fill" style="width:${s.pct.toFixed(0)}%;background:${color}"></div></div>
          <div class="ncts-trim-detail">${s.done} de ${s.total} tarefas</div>
        </div>`;
      }).join('')}
    </div>
    
    <div class="ncts-sectors">
      ${sortedSectors.map(([setor,s])=>{
        const pct=s.total>0?(s.done/s.total*100):0;
        const color=pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--cyan)';
        const emoji=SECTOR_EMOJIS[setor]||'📋';
        return`<div class="ncts-sector-card">
          <div class="ncts-sector-name"><span>${emoji} ${esc(setor)}</span><span class="ncts-sector-pct" style="color:${color}">${pct.toFixed(0)}%</span></div>
          <div class="ncts-sector-bar"><div class="ncts-sector-fill" style="width:${pct.toFixed(0)}%;background:${color}"></div></div>
          <div class="ncts-sector-detail">${s.done}/${s.total} tarefas concluídas</div>
        </div>`;
      }).join('')}
    </div>`;
}

function mapColor(ratio){
  if(ratio<=0) return carouselActive?'rgba(56,189,248,.06)':'rgba(14,165,233,.06)';
  const r=Math.max(0.1,Math.min(ratio,1));
  if(carouselActive) return `rgba(56,189,248,${(0.15+r*0.85).toFixed(2)})`;
  return `rgba(14,165,233,${(0.12+r*0.88).toFixed(2)})`;
}

async function renderLocalidade(){
  const{data}=await fetchData('LOCALIDADE');
  const totalClientes=data.length;
  const byUF={};
  data.forEach(r=>{
    const uf=(r[2]||'').trim().toUpperCase();
    if(uf.length===2){
      if(!byUF[uf])byUF[uf]={count:0,cities:{}};
      byUF[uf].count++;
      const city=(r[1]||'').trim();
      if(city)byUF[uf].cities[city]=(byUF[uf].cities[city]||0)+1;
    }
  });
  const sortedUFs=Object.entries(byUF).sort((a,b)=>b[1].count-a[1].count);
  const maxCount=sortedUFs[0]?.[1]?.count||1;
  const numStates=sortedUFs.length;
  const numCities=Object.values(byUF).reduce((s,v)=>s+Object.keys(v.cities).length,0);

  let svgHTML=BRAZIL_SVG_PATHS;
  Object.entries(byUF).forEach(([uf,v])=>{
    const ratio=v.count/maxCount;
    const color=mapColor(ratio);
    const glow=ratio>0.4?`filter:drop-shadow(0 0 ${Math.round(ratio*10)}px rgba(14,165,233,${(ratio*0.5).toFixed(2)}))`:''
    svgHTML=svgHTML.replace(`id="uf-${uf}"`,`id="uf-${uf}" fill="${color}" style="${glow}"`);
  });
  Object.keys(UF_NAMES).forEach(uf=>{
    if(!byUF[uf])svgHTML=svgHTML.replace(`id="uf-${uf}"`,`id="uf-${uf}" fill="${mapColor(0)}"`);
  });

  let labels='';
  Object.entries(UF_CENTERS).forEach(([uf,[x,y]])=>{
    const count=byUF[uf]?.count||0;
    if(count>0){
      const big=count>=maxCount*0.2;
      const fillUF=carouselActive?(big?'#fff':'#94a3b8'):(big?'#0D2137':'#64748b');
      const fillNum=carouselActive?'#38bdf8':'#0ea5e9';
      labels+=`<text x="${x}" y="${y-2}" text-anchor="middle" font-family="Nunito,sans-serif" font-size="${big?11:9}" font-weight="800" fill="${fillUF}">${uf}</text>`;
      labels+=`<text x="${x}" y="${y+11}" text-anchor="middle" font-family="Bricolage Grotesque,sans-serif" font-size="${big?14:10}" font-weight="800" fill="${fillNum}">${count}</text>`;
    }
  });
  svgHTML=svgHTML.replace('</svg>',labels+'</svg>');

  const rankN=carouselActive?10:12;
  const rankHTML=sortedUFs.slice(0,rankN).map(([uf,v],i)=>{
    const topC=Object.entries(v.cities).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c])=>c).join(', ');
    const ratio=v.count/maxCount;
    const color=mapColor(ratio);
    return`<div class="map-rank-row">
      <div class="map-rank-pos">${i+1}</div>
      <div class="map-rank-uf">${uf}</div>
      <div class="map-rank-bar"><div class="map-rank-fill" style="width:${(ratio*100).toFixed(0)}%;background:${color}"></div></div>
      <div class="map-rank-count">${v.count}</div>
      <div class="map-rank-cities" title="${esc(topC)}">${esc(topC)}</div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`
    ${tvBadge()}
    <div class="section-bar"><div style="display:flex;align-items:center;gap:14px"><div class="section-title">📍 Presença Nacional</div><div class="section-sub">${totalClientes} clientes · ${numStates} estados · ${numCities} cidades</div></div></div>
    <div class="map-layout">
      <div class="map-container">${svgHTML}</div>
      <div class="map-sidebar">
        <div class="map-legend">
          <div class="map-legend-title">Concentração de Clientes</div>
          <div class="map-legend-bar" style="background:linear-gradient(90deg,${mapColor(0)},${mapColor(0.3)},${mapColor(0.6)},${mapColor(1)})"></div>
          <div class="map-legend-labels"><span>Menor</span><span>Maior</span></div>
        </div>
        <div class="map-ranking">
          <div class="map-ranking-title">🏆 Ranking por Estado</div>
          ${rankHTML}
        </div>
      </div>
    </div>`;
}

// Impostos Lucro Presumido sobre receita de serviços
const IMPOSTOS_RECEITA={PIS:0.0065,COFINS:0.03,CSLL:0.0288,IR:0.048}; // totalizam ~10.53%
const TOTAL_IMPOSTOS=Object.values(IMPOSTOS_RECEITA).reduce((a,b)=>a+b,0);
// Categorias com desconto de 20%
const CATS_DESCONTO_20=['1.2 Pacote de laudos'];
// SAAS com desconto — verificar pela categoria 3.1
const CATS_SAAS_DESCONTO=['3.1 Licença de uso'];

function receitaLiquida(rows,c,campo){
  let bruta=0,descontos=0,impostos=0;
  rows.filter(r=>(r[c.tipo]||'').toLowerCase()==='entrada').forEach(r=>{
    const val=parseNum(r[campo]);
    const cat=(r[c.categoria]||'').trim();
    let liquido=val;
    // Desconto 20% para Pacote e SAAS com desconto
    const temDesconto=CATS_DESCONTO_20.some(p=>cat.startsWith(p))||CATS_SAAS_DESCONTO.some(p=>cat.startsWith(p));
    if(temDesconto){const desc=val*0.20;descontos+=desc;liquido-=desc}
    // Impostos sobre receita de serviços (exclui rendimentos, estornos, cursos)
    if(cat.startsWith('1.')||cat.startsWith('3.')){const imp=liquido*TOTAL_IMPOSTOS;impostos+=imp;liquido-=imp}
    bruta+=val;
  });
  return{bruta,descontos,impostos,liquida:bruta-descontos-impostos};
}

async function renderFin(){
  const{data}=await fetchData('FINANCEIRO');const c=COLS.FINANCEIRO;
  const now=new Date();
  const proj=data.filter(r=>{const d=parseDate(r[c.dataPrev]);return d&&d.getMonth()===selMonth&&d.getFullYear()===selYear});
  const real=data.filter(r=>{const d=parseDate(r[c.dataPrev]);return d&&d.getMonth()===selMonth&&d.getFullYear()===selYear&&(r[c.status]||'').toLowerCase().includes('realizado')});

  let pm=selMonth-1,py=selYear;if(pm<0){pm=11;py--}
  const pProj=data.filter(r=>{const d=parseDate(r[c.dataPrev]);return d&&d.getMonth()===pm&&d.getFullYear()===py});

  // Receitas
  const recProj=receitaLiquida(proj,c,c.valorPrev);
  const recReal=receitaLiquida(real,c,c.valorReal);
  const recPrev=receitaLiquida(pProj,c,c.valorPrev);

  // Despesas (totais apenas, sem detalhar)
  const despProj=proj.filter(r=>{const t=(r[c.tipo]||'').toLowerCase();return t==='saída'||t==='saida'}).reduce((s,r)=>s+parseNum(r[c.valorPrev]),0);
  const despReal=real.filter(r=>{const t=(r[c.tipo]||'').toLowerCase();return t==='saída'||t==='saida'}).reduce((s,r)=>s+parseNum(r[c.valorReal]),0);

  // Margem
  const margProj=recProj.liquida-despProj;
  const margReal=recReal.liquida-despReal;
  const margPct=recProj.liquida>0?(margProj/recProj.liquida*100):0;

  // Inadimplência: Entradas com status=Previsto e data já passou
  const inadimRows=data.filter(r=>{
    if((r[c.tipo]||'').toLowerCase()!=='entrada')return false;
    if((r[c.status]||'').toLowerCase().includes('realizado'))return false;
    const d=parseDate(r[c.dataPrev]);
    return d&&d<now&&d.getMonth()===selMonth&&d.getFullYear()===selYear;
  });
  const inadimVal=inadimRows.reduce((s,r)=>s+parseNum(r[c.valorPrev]),0);
  const inadimPct=recProj.bruta>0?(inadimVal/recProj.bruta*100):0;

  // Receitas por categoria (top 6)
  const rCats={};
  proj.filter(r=>(r[c.tipo]||'').toLowerCase()==='entrada').forEach(r=>{
    const cat=(r[c.categoria]||'').trim();if(!cat||cat==='-')return;
    rCats[cat]=(rCats[cat]||0)+parseNum(r[c.valorPrev]);
  });
  const topRec=Object.entries(rCats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mxR=topRec[0]?.[1]||1;

  // Realização: % do previsto já realizado
  const realizPct=recProj.bruta>0?(recReal.bruta/recProj.bruta*100):0;

  document.getElementById('mainContent').innerHTML=`
    ${tvBadge()}
    <div class="section-bar"><div style="display:flex;align-items:center;gap:14px"><div class="section-title">💰 Financeiro</div><div style="font-size:13px;color:var(--text-soft);font-weight:600">${pLabel()}</div></div></div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="kpi-card navy-card">
        <div class="kpi-label">Receita Bruta Projetada</div>
        <div class="kpi-value" style="font-size:26px">${fmtCurr(recProj.bruta)}</div>
        <div class="kpi-sub">previsto no mês</div>
        ${cmpHTML(recProj.bruta,recPrev.bruta)}
      </div>
      <div class="kpi-card" style="border-left:3px solid var(--green)">
        <div class="kpi-label">Receita Líquida Estimada</div>
        <div class="kpi-value" style="font-size:24px;color:var(--green)">${fmtCurr(recProj.liquida)}</div>
        <div class="kpi-sub">(-${(recProj.bruta>0?((recProj.descontos+recProj.impostos)/recProj.bruta*100):0).toFixed(1)}% desc+imp)</div>
      </div>
      <div class="kpi-card" style="border-left:3px solid var(--cyan)">
        <div class="kpi-label">Margem Esperada</div>
        <div class="kpi-value" style="font-size:24px;color:${margProj>=0?'var(--green)':'var(--red)'}">${fmtCurr(margProj)}</div>
        <div class="kpi-sub">${margPct.toFixed(1)}% da receita líquida</div>
      </div>
      <div class="kpi-card" style="border-left:3px solid ${inadimPct>5?'var(--red)':'var(--amber)'}">
        <div class="kpi-label">Inadimplência</div>
        <div class="kpi-value" style="font-size:24px;color:${inadimPct>5?'var(--red)':'var(--amber)'}">${fmtCurr(inadimVal)}</div>
        <div class="kpi-sub">${inadimPct.toFixed(1)}% da receita · ${inadimRows.length} títulos</div>
      </div>
    </div>

    <div class="split-row">
      <div class="split-card" style="flex-direction:column;align-items:stretch;gap:12px">

          <div class="split-type">Realização da Receita</div>
          <div style="font-family:Bricolage Grotesque,sans-serif;font-size:22px;font-weight:800;color:${realizPct>=80?'var(--green)':realizPct>=50?'var(--amber)':'var(--red)'}">${realizPct.toFixed(1)}%</div>

        </div>
      </div>
      <div class="split-card" style="flex-direction:column;align-items:stretch;gap:8px">
        <div class="split-type">Composição da Receita</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <div><div style="font-size:10px;color:var(--text-soft);font-weight:700">BRUTA</div><div style="font-family:Bricolage Grotesque,sans-serif;font-size:20px;font-weight:800;color:var(--navy)">${fmtCurr(recProj.bruta)}</div></div>
          <div><div style="font-size:10px;color:var(--red);font-weight:700">DESCONTOS (20%)</div><div style="font-family:Bricolage Grotesque,sans-serif;font-size:20px;font-weight:800;color:var(--red)">-${fmtCurr(recProj.descontos)}</div></div>
          <div><div style="font-size:10px;color:var(--amber);font-weight:700">IMPOSTOS</div><div style="font-family:Bricolage Grotesque,sans-serif;font-size:20px;font-weight:800;color:var(--amber)">-${fmtCurr(recProj.impostos)}</div></div>
          <div><div style="font-size:10px;color:var(--green);font-weight:700">LÍQUIDA</div><div style="font-family:Bricolage Grotesque,sans-serif;font-size:20px;font-weight:800;color:var(--green)">${fmtCurr(recProj.liquida)}</div></div>
        </div>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-card-title">📥 Receitas por Categoria (Bruto)</div>
      ${!topRec.length?'<p style="color:var(--text-soft);font-size:13px">Sem dados.</p>':`
      <table><thead><tr><th>#</th><th>Categoria</th><th style="width:80px"></th><th style="text-align:right">Valor</th><th style="text-align:right;padding-left:6px">%</th></tr></thead>
      <tbody>${topRec.map(([cat,v],i)=>`<tr><td class="td-rank">${i+1}</td><td class="td-name" title="${esc(cat)}">${esc(cat)}</td><td class="td-bar"><div class="bar-bg"><div class="bar-fill" style="width:${(v/mxR*100).toFixed(0)}%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div></td><td class="td-count" style="color:var(--green)">${fmtCurr(v)}</td><td class="td-pct">${recProj.bruta>0?((v/recProj.bruta)*100).toFixed(1):0}%</td></tr>`).join('')}</tbody></table>`}
    </div>`;
}
</script>
</body></html>
